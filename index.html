<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>山鹿古墳めぐり</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --ink: #1a1208;
      --aged-paper: #f0e6cc;
      --old-gold: #b8902a;
      --rust: #8b3a1a;
      --moss: #4a5e2f;
      --faded: #c9b88a;
      --light-paper: #faf4e4;
      --circle-far: rgba(184, 144, 42, 0.18);
      --circle-mid: rgba(139, 58, 26, 0.22);
      --circle-near: rgba(74, 94, 47, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--ink);
      font-family: 'Noto Serif JP', serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ヘッダー */
    .header {
      background: var(--rust);
      padding: 10px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 1000;
    }
    .header-title {
      color: var(--aged-paper);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.15em;
    }
    .header-title span { color: var(--old-gold); }
    .header-sub {
      color: var(--aged-paper);
      font-size: 10px;
      letter-spacing: 0.3em;
      opacity: 0.7;
      font-family: 'Shippori Mincho', serif;
    }

    /* マップ */
    #map {
      flex: 1;
      width: 100%;
      z-index: 1;
    }

    /* 距離パネル（マップ上に重ねる） */
    /* 距離パネルのフェードアウト */
    .distance-panel {
      transition: opacity 0.6s ease;
    }
    .distance-panel.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .distance-panel {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(26, 18, 8, 0.88);
      border: 1px solid var(--faded);
      padding: 12px 20px;
      min-width: 220px;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .distance-label {
      color: var(--faded);
      font-size: 10px;
      letter-spacing: 0.35em;
      font-family: 'Shippori Mincho', serif;
      margin-bottom: 4px;
    }
    .distance-value {
      color: var(--aged-paper);
      font-size: 28px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.05em;
    }
    .distance-value span {
      font-size: 13px;
      opacity: 0.6;
      margin-left: 4px;
    }
    .distance-status {
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: 0.2em;
      font-family: 'Shippori Mincho', serif;
      padding: 3px 10px;
      display: inline-block;
    }
    .status-far    { color: var(--old-gold); }
    .status-mid    { color: #e07040; }
    .status-near   { color: #7ec870; }
    .status-waiting { color: var(--faded); }

    /* 地図解禁ボタン */
    .unlock-btn {
      position: absolute;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      background: var(--moss);
      color: var(--aged-paper);
      border: 2px solid var(--old-gold);
      padding: 14px 32px;
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4em;
      cursor: pointer;
      display: none;
      animation: glow 1.5s ease-in-out infinite;
      white-space: nowrap;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 8px rgba(184,144,42,0.4); }
      50%       { box-shadow: 0 0 22px rgba(184,144,42,0.9); }
    }
    .unlock-btn.visible { display: block; }
    .unlock-btn.unlocked {
      background: var(--rust);
      animation: none;
      box-shadow: none;
      cursor: default;
    }
    .unlock-btn.fadeout {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    /* 現在地取得ボタン */
    .locate-btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: var(--rust);
      color: var(--aged-paper);
      border: 2px solid transparent;
      padding: 14px 36px;
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.35em;
      cursor: pointer;
      white-space: nowrap;
      /* 全状態変化をなめらかに */
      transition: background 2s ease, color 2s ease,
                  border-color 2s ease, box-shadow 2s ease,
                  opacity 2s ease;
    }
    .locate-btn:disabled {
      background: #555;
      cursor: default;
    }

    /* 現在地取得ボタン：50m以内・解禁モード */
    .locate-btn.near-mode {
      background: var(--moss);
      border: 2px solid var(--old-gold);
      animation: glow 1.5s ease-in-out infinite;
    }

    /* 次の古墳を探るボタン */
    .locate-btn.search-mode {
      background: var(--ink);
      color: var(--old-gold);
      border: 2px solid var(--old-gold);
      letter-spacing: 0.3em;
      box-shadow: inset 0 0 0 1px rgba(184,144,42,0.3);
    }

    /* GPS状態ドット */
    .gps-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--faded);
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    .gps-dot.on  { background: #7ec870; animation: pulse 1.2s infinite; }
    .gps-dot.err { background: var(--rust); }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }

    /* Leafletのデフォルトを和風に調整 */
    .leaflet-control-zoom a {
      background: var(--light-paper) !important;
      color: var(--ink) !important;
      border-color: var(--faded) !important;
    }

    /* 解禁トースト */
    .toast {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      background: var(--moss);
      color: var(--aged-paper);
      border: 1px solid var(--old-gold);
      padding: 12px 24px;
      font-size: 14px;
      letter-spacing: 0.25em;
      font-family: 'Shippori Mincho', serif;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">山鹿<span>古墳</span>めぐり</div>
      <div class="header-sub">YAMAGA KOFUN MEGURI</div>
    </div>
    <div style="text-align:right">
      <div style="color:var(--aged-paper);font-size:11px;letter-spacing:0.2em;font-family:'Shippori Mincho',serif">
        <span class="gps-dot" id="gpsDot"></span><span id="gpsLabel">未取得</span>
      </div>
    </div>
  </div>

  <div id="map" style="position:relative"></div>

  <!-- 距離パネル -->
  <div class="distance-panel" id="distPanel">
    <div class="distance-label">古墳までの距離</div>
    <div class="distance-value" id="distVal">———<span>m</span></div>
    <div class="distance-status status-waiting" id="distStatus">現在地を取得してください</div>
  </div>

  <!-- 地図解禁ボタン -->
  <button class="unlock-btn" id="unlockBtn" onclick="unlockMap()">⛩ 地図を解禁する</button>

  <!-- 現在地取得ボタン -->
  <button class="locate-btn" id="locateBtn" onclick="startWatching()">現在地を取得する</button>

  <!-- トースト -->
  <div class="toast" id="toast">🗺️ 地図が解禁されました！</div>

<script>
  // ========== 設定 ==========
  const AREAS = {
    south: {
      name: '南エリア', color: '#8b3a1a',
      polygon: [
        [33.000,130.783],[32.980,130.770],[32.950,130.750],
        [32.910,130.730],[32.890,130.680],[32.895,130.620],
        [32.920,130.575],[32.960,130.555],[33.000,130.560]
      ]
    },
    north: {
      name: '北エリア', color: '#4a5e2f',
      polygon: [
        [33.115,130.735],[33.105,130.800],[33.075,130.820],
        [33.040,130.810],[33.010,130.790],[33.000,130.783],
        [33.000,130.560],[33.040,130.570],[33.075,130.590],
        [33.095,130.630],[33.110,130.680]
      ]
    }
  };

  const KOFUN_LIST = [
    { lat:32.968486, lng:130.695630, name:'テスト古墳（作業場所）', desc:'テスト用のポイントです。', areaId:'south' },
    { lat:33.029878, lng:130.669522, name:'チブサン古墳', desc:'6世紀初頭に築造された前方後円墳。国指定史跡。', areaId:'north' },
    { lat:33.030831, lng:130.667303, name:'オブサン古墳', desc:'チブサン古墳の北西約200mに位置する円墳。国指定史跡。', areaId:'north' },
    { lat:32.995704, lng:130.669882, name:'岩原古墳群', desc:'5世紀に築造。岩原双子塚古墳は熊本県最大級の前方後円墳（全長107m）。', areaId:'south' }
  ];

  const R_FAR=1000, R_MID=500, R_CLOSE=100, R_NEAR=50;
  let currentKofunIndex=0, KOFUN=KOFUN_LIST[0];
  let userMarker=null, watchId=null, isUnlocked=false;
  const unlockedKofunSet=new Set(), unlockedAreaSet=new Set();

  // ========== 地図初期化 ==========
  const map = L.map('map',{zoomControl:true}).setView([33.0,130.68],13);

  // 下層：歴史地図（常時全面表示）
  const tileHistory = L.tileLayer(
    'https://cyberjapandata.gsi.go.jp/xyz/ort_old10/{z}/{x}/{y}.png',
    {attribution:'国土地理院（空中写真1961〜1969年）', minZoom:8, maxZoom:17}
  ).addTo(map);

  // 上層：通常地図（専用pane・高いzIndex）
  map.createPane('normalPane');
  map.getPane('normalPane').style.zIndex = 400;
  const tileNormal = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap contributors', maxZoom:19, pane:'normalPane'}
  ).addTo(map);

  // ── エリアごとに「通常地図を覆うマスクポリゴン」を専用paneに配置 ──
  // 解禁時にそのエリアのマスクをフェードアウトで除去する
  map.createPane('maskPane');
  map.getPane('maskPane').style.zIndex = 450; // normalPaneより上
  map.getPane('maskPane').style.pointerEvents = 'none';

  const areaMaskLayers = {};
  Object.entries(AREAS).forEach(([id, area]) => {
    // 通常地図と同じ見た目に見えるよう半透明白で覆う（実際は通常地図が見えている）
    // → 解禁するとこのマスクが消えて下の歴史地図が露出する
    areaMaskLayers[id] = L.polygon(area.polygon, {
      pane: 'maskPane',
      color: 'transparent',
      fillColor: '#f5f3ef',
      fillOpacity: 0.97,
      interactive: false
    }).addTo(map);
  });

  // エリア境界線（マスクより上のpane）
  map.createPane('borderPane');
  map.getPane('borderPane').style.zIndex = 500;
  map.getPane('borderPane').style.pointerEvents = 'none';
  const areaPolygons = {};
  Object.entries(AREAS).forEach(([id, area]) => {
    areaPolygons[id] = L.polygon(area.polygon, {
      pane: 'borderPane',
      color: area.color, weight: 2, opacity: 0.6,
      fillOpacity: 0, dashArray: '6,4'
    }).addTo(map);
  });

  // 古墳アイコン
  const kofunIcon = L.divIcon({
    className:'',
    html:`<div style="width:32px;height:32px;background:#8b3a1a;border:2px solid #b8902a;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:14px">⛩</span></div>`,
    iconSize:[32,32], iconAnchor:[16,32]
  });
  const kofunMarkers = new Array(KOFUN_LIST.length).fill(null);

  // 距離円
  let circleFar   = L.circle([KOFUN.lat,KOFUN.lng],{radius:R_FAR,  color:'#b8902a',weight:1.5,opacity:0.7,fillColor:'#b8902a',fillOpacity:0.06}).addTo(map);
  let circleMid   = L.circle([KOFUN.lat,KOFUN.lng],{radius:R_MID,  color:'#8b3a1a',weight:1.5,opacity:0,fillOpacity:0}).addTo(map);
  let circleClose = L.circle([KOFUN.lat,KOFUN.lng],{radius:R_CLOSE,color:'#c07030',weight:1.5,opacity:0,fillOpacity:0}).addTo(map);
  let circleNear  = L.circle([KOFUN.lat,KOFUN.lng],{radius:R_NEAR, color:'#4a5e2f',weight:2,  opacity:0,fillOpacity:0}).addTo(map);
  const circleShown={mid:false,close:false,near:false};

  function revealCircle(circle,color,fillOp,strokeOp){
    let op=0;
    const iv=setInterval(()=>{
      op+=0.05; if(op>=1){op=1;clearInterval(iv);}
      circle.setStyle({opacity:strokeOp*op,fillOpacity:fillOp*op});
    },30);
  }

  // ========== 距離計算 ==========
  function calcDistance(lat1,lng1,lat2,lng2){
    const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  // ========== GPS ==========
  function startWatching(){
    if(!navigator.geolocation){alert('位置情報非対応');return;}
    const btn=document.getElementById('locateBtn');
    btn.disabled=true; btn.textContent='取得中…';
    setGps('on','GPS取得中');
    if(watchId) navigator.geolocation.clearWatch(watchId);
    watchId=navigator.geolocation.watchPosition(onPosition,onError,
      {enableHighAccuracy:true,timeout:15000,maximumAge:0});
  }

  function onPosition(pos){
    const {latitude:lat,longitude:lng}=pos.coords;
    const btn=document.getElementById('locateBtn');
    if(btn.textContent==='取得中…'){btn.disabled=false;btn.textContent='現在地を更新中 ●';}
    setGps('on','取得済み');
    if(userMarker){
      userMarker.setLatLng([lat,lng]);
    }else{
      const icon=L.divIcon({className:'',
        html:`<div style="width:16px;height:16px;background:#4a9fff;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(74,159,255,0.8);"></div>`,
        iconSize:[16,16],iconAnchor:[8,8]});
      userMarker=L.marker([lat,lng],{icon}).addTo(map).bindPopup('現在地');
      map.setView([lat,lng],15);
    }
    if(!isUnlocked) updateDistanceUI(calcDistance(lat,lng,KOFUN.lat,KOFUN.lng));
  }

  function onError(err){
    const btn=document.getElementById('locateBtn');
    btn.disabled=false; btn.textContent='再取得する';
    setGps('err','エラー');
    const msgs={1:'位置情報が拒否されました。',2:'位置情報を取得できませんでした。',3:'タイムアウトしました。'};
    document.getElementById('distStatus').textContent=msgs[err.code]||'エラー';
    document.getElementById('distStatus').className='distance-status status-far';
  }

  function setGps(state,label){
    document.getElementById('gpsDot').className='gps-dot '+state;
    document.getElementById('gpsLabel').textContent=label;
  }

  // ========== UI更新 ==========
  function updateDistanceUI(dist){
    const valEl=document.getElementById('distVal');
    const statusEl=document.getElementById('distStatus');
    valEl.innerHTML=dist>=1000?(dist/1000).toFixed(2)+'<span>km</span>':Math.round(dist)+'<span>m</span>';
    if(dist<=R_NEAR){
      statusEl.textContent='◎ 古墳の真近！地図を解禁できます';
      statusEl.className='distance-status status-near';
      if(!circleShown.near){circleShown.near=true;circleNear.setStyle({color:'#7ec870',fillColor:'#7ec870'});revealCircle(circleNear,'#7ec870',0.3,0.9);}
      if(!isUnlocked){const b=document.getElementById('locateBtn');b.textContent='⛩ 地図を解禁する';b.classList.add('near-mode');b.onclick=unlockMap;}
    }else if(dist<=R_CLOSE){
      statusEl.textContent='▲ もう少し！（100m以内）';
      statusEl.className='distance-status status-near';
      if(!circleShown.close){circleShown.close=true;revealCircle(circleClose,'#c07030',0.1,0.7);}
      if(!isUnlocked) resetLocateBtn();
    }else if(dist<=R_MID){
      statusEl.textContent='● さらに近づいてください（500m以内）';
      statusEl.className='distance-status status-mid';
      if(!circleShown.mid){circleShown.mid=true;revealCircle(circleMid,'#8b3a1a',0.08,0.7);}
      if(!isUnlocked) resetLocateBtn();
    }else if(dist<=R_FAR){
      statusEl.textContent='〇 古墳を感知しました（1km以内）';
      statusEl.className='distance-status status-far';
      if(!isUnlocked) resetLocateBtn();
    }else{
      statusEl.textContent='古墳の範囲外です';
      statusEl.className='distance-status status-waiting';
      if(!isUnlocked) resetLocateBtn();
    }
  }

  function resetLocateBtn(){
    const b=document.getElementById('locateBtn');
    if(b.classList.contains('near-mode')){b.textContent='現在地を更新中 ●';b.classList.remove('near-mode');b.onclick=startWatching;}
  }

  // ========== 地図解禁 ==========
  function unlockMap(){
    if(isUnlocked) return;
    isUnlocked=true;

    const panel=document.getElementById('distPanel');
    panel.classList.add('hidden');
    setTimeout(()=>panel.style.display='none',700);

    const locBtn=document.getElementById('locateBtn');
    setTimeout(()=>{
      locBtn.textContent='🧭 次の古墳を探る';
      locBtn.classList.remove('near-mode');
      locBtn.classList.add('search-mode');
      locBtn.disabled=false;
      locBtn.onclick=searchNextKofun;
    },2000);

    const toast=document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),3500);

    unlockedKofunSet.add(currentKofunIndex);
    if(!kofunMarkers[currentKofunIndex]){
      kofunMarkers[currentKofunIndex]=L.marker([KOFUN.lat,KOFUN.lng],{icon:kofunIcon})
        .addTo(map)
        .bindPopup(`<b>${KOFUN.name}</b><br>${KOFUN.desc}`,{closeButton:true,autoClose:false,closeOnClick:false});
    }

    const areaId=KOFUN.areaId;
    if(!unlockedAreaSet.has(areaId)){
      unlockedAreaSet.add(areaId);

      // 境界線を強調
      areaPolygons[areaId].setStyle({color:AREAS[areaId].color,weight:3,opacity:0.9,dashArray:null});

      // マスクをフェードアウト → 歴史地図が露出
      const mask=areaMaskLayers[areaId];
      let op=0.97;
      const iv=setInterval(()=>{
        op-=0.02;
        if(op<=0){op=0;clearInterval(iv);map.removeLayer(mask);}
        mask.setStyle({fillOpacity:op});
      },40);
    }
    setTimeout(()=>{if(map.getZoom()>16)map.setZoom(16);},2000);
  }

  // ========== 次の古墳を探る ==========
  function searchNextKofun(){
    let nearestIdx=-1,nearestDist=Infinity;
    if(userMarker){
      const {lat,lng}=userMarker.getLatLng();
      KOFUN_LIST.forEach((k,i)=>{
        if(unlockedKofunSet.has(i)) return;
        const d=calcDistance(lat,lng,k.lat,k.lng);
        if(d<nearestDist){nearestDist=d;nearestIdx=i;}
      });
    }
    if(nearestIdx===-1){
      const b=document.getElementById('locateBtn');
      b.textContent='✨ 全古墳を制覇！';b.disabled=true;return;
    }
    currentKofunIndex=nearestIdx; KOFUN=KOFUN_LIST[currentKofunIndex];
    circleFar.setLatLng([KOFUN.lat,KOFUN.lng]);
    circleMid.setLatLng([KOFUN.lat,KOFUN.lng]);
    circleClose.setLatLng([KOFUN.lat,KOFUN.lng]);
    circleNear.setLatLng([KOFUN.lat,KOFUN.lng]);
    circleMid.setStyle({opacity:0,fillOpacity:0});
    circleClose.setStyle({opacity:0,fillOpacity:0});
    circleNear.setStyle({color:'#4a5e2f',fillColor:'#4a5e2f',opacity:0,fillOpacity:0});
    circleShown.mid=false;circleShown.close=false;circleShown.near=false;
    map.flyTo([KOFUN.lat,KOFUN.lng],14,{animate:true,duration:2.0});
    isUnlocked=false;
    const panel=document.getElementById('distPanel');
    panel.style.display='';
    setTimeout(()=>panel.classList.remove('hidden'),50);
    const b=document.getElementById('locateBtn');
    b.textContent='現在地を更新中 ●';b.classList.remove('search-mode');b.onclick=startWatching;
    if(userMarker){
      const {lat,lng}=userMarker.getLatLng();
      updateDistanceUI(calcDistance(lat,lng,KOFUN.lat,KOFUN.lng));
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>山鹿古墳めぐり</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --ink: #1a1208;
      --aged-paper: #f0e6cc;
      --old-gold: #b8902a;
      --rust: #8b3a1a;
      --moss: #4a5e2f;
      --faded: #c9b88a;
      --light-paper: #faf4e4;
      --circle-far: rgba(184, 144, 42, 0.18);
      --circle-mid: rgba(139, 58, 26, 0.22);
      --circle-near: rgba(74, 94, 47, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--ink);
      font-family: 'Noto Serif JP', serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ヘッダー */
    .header {
      background: var(--rust);
      padding: 10px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 1000;
    }
    .header-title {
      color: var(--aged-paper);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.15em;
    }
    .header-title span { color: var(--old-gold); }
    .header-sub {
      color: var(--aged-paper);
      font-size: 10px;
      letter-spacing: 0.3em;
      opacity: 0.7;
      font-family: 'Shippori Mincho', serif;
    }

    /* マップ */
    #map {
      flex: 1;
      width: 100%;
      z-index: 1;
    }

    /* 距離パネル（マップ上に重ねる） */
    .distance-panel {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(26, 18, 8, 0.88);
      border: 1px solid var(--faded);
      padding: 12px 20px;
      min-width: 220px;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .distance-label {
      color: var(--faded);
      font-size: 10px;
      letter-spacing: 0.35em;
      font-family: 'Shippori Mincho', serif;
      margin-bottom: 4px;
    }
    .distance-value {
      color: var(--aged-paper);
      font-size: 28px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.05em;
    }
    .distance-value span {
      font-size: 13px;
      opacity: 0.6;
      margin-left: 4px;
    }
    .distance-status {
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: 0.2em;
      font-family: 'Shippori Mincho', serif;
      padding: 3px 10px;
      display: inline-block;
    }
    .status-far    { color: var(--old-gold); }
    .status-mid    { color: #e07040; }
    .status-near   { color: #7ec870; }
    .status-waiting { color: var(--faded); }

    /* 地図解禁ボタン */
    .unlock-btn {
      position: absolute;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      background: var(--moss);
      color: var(--aged-paper);
      border: 2px solid var(--old-gold);
      padding: 14px 32px;
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4em;
      cursor: pointer;
      display: none;
      animation: glow 1.5s ease-in-out infinite;
      white-space: nowrap;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 8px rgba(184,144,42,0.4); }
      50%       { box-shadow: 0 0 22px rgba(184,144,42,0.9); }
    }
    .unlock-btn.visible { display: block; }
    .unlock-btn.unlocked {
      background: var(--rust);
      animation: none;
      box-shadow: none;
      cursor: default;
    }

    /* 現在地取得ボタン */
    .locate-btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: var(--rust);
      color: var(--aged-paper);
      border: none;
      padding: 14px 36px;
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.35em;
      cursor: pointer;
      white-space: nowrap;
    }
    .locate-btn:disabled {
      background: #555;
      cursor: default;
    }

    /* GPS状態ドット */
    .gps-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--faded);
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    .gps-dot.on  { background: #7ec870; animation: pulse 1.2s infinite; }
    .gps-dot.err { background: var(--rust); }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }

    /* Leafletのデフォルトを和風に調整 */
    .leaflet-control-zoom a {
      background: var(--light-paper) !important;
      color: var(--ink) !important;
      border-color: var(--faded) !important;
    }

    /* 解禁トースト */
    .toast {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      background: var(--moss);
      color: var(--aged-paper);
      border: 1px solid var(--old-gold);
      padding: 12px 24px;
      font-size: 14px;
      letter-spacing: 0.25em;
      font-family: 'Shippori Mincho', serif;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">山鹿<span>古墳</span>めぐり</div>
      <div class="header-sub">YAMAGA KOFUN MEGURI</div>
    </div>
    <div style="text-align:right">
      <div style="color:var(--aged-paper);font-size:11px;letter-spacing:0.2em;font-family:'Shippori Mincho',serif">
        <span class="gps-dot" id="gpsDot"></span><span id="gpsLabel">未取得</span>
      </div>
    </div>
  </div>

  <div id="map" style="position:relative"></div>

  <!-- 距離パネル -->
  <div class="distance-panel" id="distPanel">
    <div class="distance-label">古墳までの距離</div>
    <div class="distance-value" id="distVal">———<span>m</span></div>
    <div class="distance-status status-waiting" id="distStatus">現在地を取得してください</div>
  </div>

  <!-- 地図解禁ボタン -->
  <button class="unlock-btn" id="unlockBtn" onclick="unlockMap()">⛩ 地図を解禁する</button>

  <!-- 現在地取得ボタン -->
  <button class="locate-btn" id="locateBtn" onclick="startWatching()">現在地を取得する</button>

  <!-- トースト -->
  <div class="toast" id="toast">🗺️ 地図が解禁されました！</div>

<script>
  // ========== 設定 ==========
  const KOFUN = {
    lat: 32.968486,
    lng: 130.695630,
    name: 'テスト古墳（作業場所）'
  };
  const R_FAR  = 1000; // 1km：外円
  const R_MID  =  500; // 500m：中円
  const R_NEAR =    5; // 5m：解禁圏（テスト用）

  // ========== 地図初期化 ==========
  const map = L.map('map', { zoomControl: true }).setView([KOFUN.lat, KOFUN.lng], 15);

  // OpenStreetMap（無料）
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  // 古墳マーカー
  const kofunIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:32px;height:32px;
      background:var(--rust,#8b3a1a);
      border:2px solid #b8902a;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      display:flex;align-items:center;justify-content:center;
    "><span style="transform:rotate(45deg);font-size:14px">⛩</span></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });
  L.marker([KOFUN.lat, KOFUN.lng], { icon: kofunIcon })
    .addTo(map)
    .bindPopup(`<b>${KOFUN.name}</b><br>古墳ポイント`);

  // 距離円（外→内の順で描画）
  const circleFar = L.circle([KOFUN.lat, KOFUN.lng], {
    radius: R_FAR,
    color: '#b8902a', weight: 1.5, opacity: 0.7,
    fillColor: '#b8902a', fillOpacity: 0.06
  }).addTo(map);

  const circleMid = L.circle([KOFUN.lat, KOFUN.lng], {
    radius: R_MID,
    color: '#8b3a1a', weight: 1.5, opacity: 0.7,
    fillColor: '#8b3a1a', fillOpacity: 0.08
  }).addTo(map);

  const circleNear = L.circle([KOFUN.lat, KOFUN.lng], {
    radius: R_NEAR,
    color: '#4a5e2f', weight: 2, opacity: 0.9,
    fillColor: '#4a5e2f', fillOpacity: 0.15
  }).addTo(map);

  // 現在地マーカー（後で更新）
  let userMarker = null;
  let watchId    = null;
  let isUnlocked = false;

  // ========== 距離計算（Haversine公式）==========
  function calcDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000; // 地球半径(m)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // ========== 位置情報取得 ==========
  function startWatching() {
    if (!navigator.geolocation) {
      alert('このブラウザは位置情報に対応していません');
      return;
    }
    const btn = document.getElementById('locateBtn');
    btn.disabled = true;
    btn.textContent = '取得中…';
    setGps('on', 'GPS取得中');

    if (watchId) navigator.geolocation.clearWatch(watchId);

    watchId = navigator.geolocation.watchPosition(
      onPosition,
      onError,
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  function onPosition(pos) {
    const { latitude: lat, longitude: lng } = pos.coords;

    // ボタン更新
    const btn = document.getElementById('locateBtn');
    btn.disabled = false;
    btn.textContent = '現在地を更新中 ●';
    setGps('on', '取得済み');

    // 現在地マーカー更新
    if (userMarker) {
      userMarker.setLatLng([lat, lng]);
    } else {
      const userIcon = L.divIcon({
        className: '',
        html: `<div style="
          width:16px;height:16px;
          background:#4a9fff;
          border:3px solid #fff;
          border-radius:50%;
          box-shadow:0 0 8px rgba(74,159,255,0.8);
        "></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });
      userMarker = L.marker([lat, lng], { icon: userIcon })
        .addTo(map)
        .bindPopup('現在地');
      map.setView([lat, lng], 15);
    }

    // 距離計算
    const dist = calcDistance(lat, lng, KOFUN.lat, KOFUN.lng);
    updateDistanceUI(dist);
  }

  function onError(err) {
    const btn = document.getElementById('locateBtn');
    btn.disabled = false;
    btn.textContent = '再取得する';
    setGps('err', 'エラー');

    const msgs = {
      1: '位置情報が拒否されました。設定から許可してください。',
      2: '位置情報を取得できませんでした。',
      3: 'タイムアウトしました。再度お試しください。'
    };
    document.getElementById('distStatus').textContent = msgs[err.code] || 'エラー';
    document.getElementById('distStatus').className = 'distance-status status-far';
  }

  // ========== UI更新 ==========
  function updateDistanceUI(dist) {
    const valEl    = document.getElementById('distVal');
    const statusEl = document.getElementById('distStatus');
    const unlockBtn = document.getElementById('unlockBtn');

    // 距離表示
    if (dist >= 1000) {
      valEl.innerHTML = (dist / 1000).toFixed(2) + '<span>km</span>';
    } else {
      valEl.innerHTML = Math.round(dist) + '<span>m</span>';
    }

    // ステータス・円の色変化
    if (dist <= R_NEAR) {
      statusEl.textContent  = '◎ 古墳の真近！地図を解禁できます';
      statusEl.className    = 'distance-status status-near';
      // 解禁ボタン表示（未解禁なら）
      if (!isUnlocked) unlockBtn.classList.add('visible');
      // 近接円を強調
      circleNear.setStyle({ color: '#7ec870', fillColor: '#7ec870', fillOpacity: 0.3 });
    } else if (dist <= R_MID) {
      statusEl.textContent  = '▲ もう少し近づいてください（500m以内）';
      statusEl.className    = 'distance-status status-mid';
      unlockBtn.classList.remove('visible');
      circleNear.setStyle({ color: '#4a5e2f', fillColor: '#4a5e2f', fillOpacity: 0.15 });
    } else if (dist <= R_FAR) {
      statusEl.textContent  = '● 古墳を感知しました（1km以内）';
      statusEl.className    = 'distance-status status-far';
      unlockBtn.classList.remove('visible');
      circleNear.setStyle({ color: '#4a5e2f', fillColor: '#4a5e2f', fillOpacity: 0.15 });
    } else {
      statusEl.textContent  = '古墳の範囲外です';
      statusEl.className    = 'distance-status status-waiting';
      unlockBtn.classList.remove('visible');
      circleNear.setStyle({ color: '#4a5e2f', fillColor: '#4a5e2f', fillOpacity: 0.15 });
    }
  }

  function setGps(state, label) {
    document.getElementById('gpsDot').className  = 'gps-dot ' + state;
    document.getElementById('gpsLabel').textContent = label;
  }

  // ========== 地図解禁 ==========
  function unlockMap() {
    if (isUnlocked) return;
    isUnlocked = true;

    const btn = document.getElementById('unlockBtn');
    btn.textContent = '✓ 解禁済み';
    btn.classList.add('unlocked');

    // トースト表示
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);

    // 古墳マーカーをポップアップ表示
    map.eachLayer(l => {
      if (l.getPopup && l.getLatLng) {
        const latlng = l.getLatLng();
        if (Math.abs(latlng.lat - KOFUN.lat) < 0.0001) l.openPopup();
      }
    });
  }
</script>
</body>
</html>
